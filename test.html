<!DOCTYPE html>
<html>
<head>
    <title>JavaScript Test</title>
</head>
<body>
    <button id="test-btn">Test Button</button>
    <div id="output"></div>
    
    <script>
        // Test the MessengerApp class syntax
        try {
            class TestApp {
                constructor() {
                    this.init();
                }
                
                init() {
                    document.getElementById('test-btn').addEventListener('click', () => {
                        document.getElementById('output').innerHTML = '✅ JavaScript syntax is working!';
                    });
                }
            }
            
            new TestApp();
            document.getElementById('output').innerHTML = '✅ Class loaded successfully - no syntax errors!';
        } catch (error) {
            document.getElementById('output').innerHTML = '❌ Syntax error: ' + error.message;
        }
    </script>
</body>
</html>
