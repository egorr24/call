<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Видеозвонки</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>🎥 Видеозвонки</h1>
            <p>Создайте комнату и поделитесь ссылкой для звонка</p>
        </div>
        
        <div class="main-content">
            <div class="create-room">
                <button id="createRoomBtn" class="btn btn-primary">
                    Создать комнату для звонка
                </button>
            </div>
            
            <div class="join-room">
                <h3>Или присоединитесь к существующей комнате:</h3>
                <div class="input-group">
                    <input type="text" id="roomIdInput" placeholder="Введите ID комнаты">
                    <button id="joinRoomBtn" class="btn btn-secondary">Войти</button>
                </div>
            </div>
        </div>
        
        <div id="roomLink" class="room-link" style="display: none;">
            <h3>Ссылка на вашу комнату:</h3>
            <div class="link-container">
                <input type="text" id="linkInput" readonly>
                <button id="copyLinkBtn" class="btn btn-copy">Копировать</button>
            </div>
            <p class="link-info">Поделитесь этой ссылкой с теми, кого хотите пригласить на звонок</p>
            <button id="enterRoomBtn" class="btn btn-primary">Войти в комнату</button>
        </div>
    </div>

    <script src="/socket.io/socket.io.js"></script>
    <script src="app.js"></script>
</body>
</html>
