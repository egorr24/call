<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="theme-color" content="#1a1a1a">
    <meta name="apple-mobile-web-app-title" content="Flux Messenger">
    
    <!-- Оптимизация для производительности -->
    <meta name="format-detection" content="telephone=no">
    <meta name="msapplication-tap-highlight" content="no">
    
    <!-- Предзагрузка критических ресурсов -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://api.dicebear.com">
    <title>Flux Messenger</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
</head>
<body>
    <!-- Экран авторизации -->
    <div id="auth-screen" class="screen active">
        <div class="auth-container">
            <div class="auth-header">
                <h1><i class="fas fa-comments"></i> Flux</h1>
                <p>Современный мессенджер нового поколения</p>
            </div>
            
            <div class="auth-tabs">
                <button class="tab-btn active" data-tab="login">Вход</button>
                <button class="tab-btn" data-tab="register">Регистрация</button>
            </div>
            
            <!-- Форма входа -->
            <div id="login-form" class="auth-form active">
                <div class="form-group">
                    <i class="fas fa-envelope"></i>
                    <input type="email" id="login-email" class="form-input" placeholder="Email" required autocomplete="email">
                </div>
                <div class="form-group">
                    <i class="fas fa-lock"></i>
                    <input type="password" id="login-password" class="form-input" placeholder="Пароль" required autocomplete="current-password">
                </div>
                <button type="button" class="auth-btn btn-primary">
                    <i class="fas fa-sign-in-alt"></i> <span>Войти</span>
                </button>
            </div>
            
            <!-- Форма регистрации -->
            <div id="register-form" class="auth-form">
                <div class="form-group">
                    <i class="fas fa-user"></i>
                    <input type="text" id="register-username" class="form-input" placeholder="Имя пользователя" required autocomplete="username">
                </div>
                <div class="form-group">
                    <i class="fas fa-envelope"></i>
                    <input type="email" id="register-email" class="form-input" placeholder="Email" required autocomplete="email">
                </div>
                <div class="form-group">
                    <i class="fas fa-lock"></i>
                    <input type="password" id="register-password" class="form-input" placeholder="Пароль (минимум 6 символов)" required autocomplete="new-password">
                </div>
                <button type="button" class="auth-btn btn-primary">
                    <i class="fas fa-user-plus"></i> <span>Зарегистрироваться</span>
                </button>
            </div>
        </div>
    </div>

    <!-- Главный экран мессенджера -->
    <div id="messenger-screen" class="screen">
        <div class="messenger-container">
            <!-- Боковая панель -->
            <div class="sidebar">
                <div class="sidebar-header">
                    <div class="user-info">
                        <img id="user-avatar" src="" alt="Avatar" class="avatar">
                        <div class="user-details">
                            <span id="user-name"></span>
                            <span class="status online">В сети</span>
                        </div>
                    </div>
                    <div class="header-actions">
                        <button class="icon-btn" title="Найти пользователей">
                            <i class="fas fa-user-plus"></i>
                        </button>
                        <button class="icon-btn" title="Настройки">
                            <i class="fas fa-cog"></i>
                        </button>
                        <button class="icon-btn" title="Выйти">
                            <i class="fas fa-sign-out-alt"></i>
                        </button>
                    </div>
                </div>
                
                <div class="search-bar">
                    <i class="fas fa-search"></i>
                    <input type="text" placeholder="Поиск чатов..." id="chat-search">
                </div>
                
                <div class="chats-list" id="chats-list">
                    <!-- Чаты будут загружены динамически -->
                </div>
            </div>

            <!-- Область чата -->
            <div class="chat-area">
                <div id="no-chat-selected" class="no-chat">
                    <i class="fas fa-comments"></i>
                    <h3>Выберите чат для начала общения</h3>
                    <p>Выберите существующий чат или найдите пользователя для создания нового</p>
                </div>
                
                <div id="chat-container" class="chat-container" style="display: none;">
                    <div class="chat-header">
                        <div class="chat-user-info">
                            <img id="chat-avatar" src="" alt="Avatar" class="avatar">
                            <div class="chat-user-details">
                                <span id="chat-username"></span>
                                <span id="chat-status" class="status"></span>
                            </div>
                        </div>
                        <div class="chat-actions">
                            <button class="icon-btn" title="Видеозвонок">
                                <i class="fas fa-video"></i>
                            </button>
                            <button class="icon-btn" title="Аудиозвонок">
                                <i class="fas fa-phone"></i>
                            </button>
                        </div>
                    </div>
                    
                    <div class="messages-container" id="messages-container">
                        <!-- Сообщения будут загружены динамически -->
                    </div>
                    
                    <div class="message-input-container">
                        <div class="message-input">
                            <input type="file" id="file-input" style="display: none;" accept="image/*,video/*,.pdf,.doc,.docx,.txt,.zip,.rar" multiple>
                            <button class="icon-btn" title="Прикрепить файл">
                                <i class="fas fa-paperclip"></i>
                            </button>
                            <button class="icon-btn" title="Отправить фото">
                                <i class="fas fa-image"></i>
                            </button>
                            <input type="text" id="message-input" placeholder="Введите сообщение..." maxlength="1000">
                            <button class="icon-btn send-btn" title="Отправить">
                                <i class="fas fa-paper-plane"></i>
                            </button>
                        </div>
                        <div id="file-preview" class="file-preview" style="display: none;"></div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- Модальное окно настроек -->
    <div id="settings-modal" class="modal">
        <div class="modal-content">
            <div class="modal-header">
                <h3><i class="fas fa-cog"></i> Настройки профиля</h3>
                <button class="close-btn">
                    <i class="fas fa-times"></i>
                </button>
            </div>
            <div class="modal-body">
                <div class="settings-section">
                    <h4>Аватар</h4>
                    <div class="avatar-section">
                        <img id="settings-avatar" src="" alt="Avatar" class="settings-avatar">
                        <input type="file" id="avatar-input" style="display: none;" accept="image/*">
                        <button class="btn-secondary">Изменить аватар</button>
                    </div>
                </div>
                
                <div class="settings-section">
                    <h4>Информация</h4>
                    <div class="form-group">
                        <label>Имя пользователя</label>
                        <input type="text" id="settings-username" placeholder="Имя пользователя">
                    </div>
                    <div class="form-group">
                        <label>Email</label>
                        <input type="email" id="settings-email" placeholder="Email" readonly>
                    </div>
                </div>
                
                <div class="settings-section">
                    <h4>Безопасность</h4>
                    <div class="form-group">
                        <label>Новый пароль</label>
                        <input type="password" id="settings-password" placeholder="Оставьте пустым, чтобы не менять">
                    </div>
                </div>
                
                <div class="settings-actions">
                    <button class="btn-primary">Сохранить изменения</button>
                    <button class="btn-secondary">Отмена</button>
                </div>
            </div>
        </div>
    </div>

    <!-- Модальное окно поиска пользователей -->
    <div id="users-modal" class="modal">
        <div class="modal-content">
            <div class="modal-header">
                <h3><i class="fas fa-users"></i> Найти пользователей</h3>
                <button class="close-btn">
                    <i class="fas fa-times"></i>
                </button>
            </div>
            <div class="modal-body">
                <div class="search-bar">
                    <i class="fas fa-search"></i>
                    <input type="text" placeholder="Поиск пользователей..." id="user-search">
                </div>
                <div class="users-list" id="users-list">
                    <!-- Пользователи будут загружены динамически -->
                </div>
            </div>
        </div>
    </div>

    <!-- Экран видеозвонка -->
    <div id="video-call-screen" class="screen">
        <div class="video-call-container">
            <div class="video-area">
                <video id="remote-video" autoplay class="remote-video"></video>
                <video id="local-video" autoplay muted class="local-video"></video>
            </div>
            
            <div class="call-controls">
                <button id="toggle-video-btn" class="control-btn video-btn">
                    <i class="fas fa-video"></i>
                </button>
                <button id="toggle-audio-btn" class="control-btn audio-btn">
                    <i class="fas fa-microphone"></i>
                </button>
                <button class="control-btn screen-btn">
                    <i class="fas fa-desktop"></i>
                </button>
                <button class="control-btn end-btn">
                    <i class="fas fa-phone-slash"></i>
                </button>
            </div>
            
            <div class="call-info">
                <span id="call-status">Подключение...</span>
                <span id="call-duration">00:00</span>
            </div>
        </div>
    </div>

    <script src="/socket.io/socket.io.js"></script>
    <script src="script.js"></script>
</body>
</html>
